name: zsxgboost
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # Core scientific stack
  - numpy>=1.21
  - scipy>=1.7
  - scikit-learn>=1.0
  - matplotlib>=3.5
  - pandas>=1.4
  # Chemistry
  - rdkit>=2022.09
  # Notebook
  - jupyter
  - ipykernel
  - pip:
    - xgboost>=2.0
    - loguru>=0.6
    - rich>=12.0
    - PyTDC>=0.4
    - -e .
